<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#C89B3C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Mailen &amp; Javier — Wedding Photo Booth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ======================================================
       SCREEN 1: Welcome
       ====================================================== -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-bg"></div>
    <div class="welcome-content">
      <div class="rings-icon">💍</div>
      <h1 class="title">Mailen &amp; Javier</h1>
      <p class="subtitle">Wedding Photo Booth</p>
      <p class="tagline">Escanea el QR y comparte tu momento</p>
      <div class="btn-group">
        <button class="btn btn-primary" id="btn-take-photo">
          <span class="btn-icon">📷</span>
          <span>Tomar Foto</span>
        </button>
        <button class="btn btn-secondary" id="btn-upload-photo">
          <span class="btn-icon">🖼</span>
          <span>Subir Foto</span>
        </button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
    </div>
  </div>

  <!-- ======================================================
       SCREEN 2: Camera
       ====================================================== -->
  <div id="screen-camera" class="screen">
    <div class="screen-header">
      <button class="btn-back" id="btn-back-camera" aria-label="Volver">← Volver</button>
      <h2 class="screen-title">Tomar Foto</h2>
    </div>
    <div class="camera-container">
      <video id="video-preview" autoplay playsinline muted></video>
      <div class="camera-frame-overlay"></div>
    </div>
    <div class="camera-controls">
      <button class="btn-flip" id="btn-flip-camera" aria-label="Voltear cámara">⇄</button>
      <button class="btn-shutter" id="btn-shutter" aria-label="Tomar foto"></button>
      <div class="camera-spacer"></div>
    </div>
    <canvas id="canvas-capture" style="display:none"></canvas>
  </div>

  <!-- ======================================================
       SCREEN 3: Edit / Customize
       ====================================================== -->
  <div id="screen-edit" class="screen">
    <div class="screen-header">
      <button class="btn-back" id="btn-back-edit" aria-label="Volver">← Volver</button>
      <h2 class="screen-title">Personalizar</h2>
    </div>

    <div class="edit-body">

      <!-- LEFT / TOP: Preview -->
      <div class="preview-wrap">
        <canvas id="canvas-final"></canvas>
      </div>

      <!-- RIGHT / BOTTOM: Controls (independently scrollable) -->
      <div class="controls-panel">

        <div class="section-label">Fondo</div>
        <!-- Cards generated by app.js from config.js -->
        <div class="options-row" id="bg-options" role="listbox" aria-label="Seleccionar fondo"></div>

        <div class="section-label">Marco</div>
        <!-- Cards generated by app.js from config.js -->
        <div class="options-row" id="frame-options" role="listbox" aria-label="Seleccionar marco"></div>

        <div class="section-label">Texto personalizado</div>
        <div class="text-input-row">
          <input
            type="text"
            id="overlay-text"
            placeholder="Ej: ¡Felices para siempre! 💕"
            maxlength="60"
            autocomplete="off"
          />
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary btn-full" id="btn-preview">
            Ver previsualización →
          </button>
        </div>

      </div><!-- /controls-panel -->
    </div><!-- /edit-body -->
  </div>

  <!-- ======================================================
       SCREEN 4: Final Preview & Upload
       ====================================================== -->
  <div id="screen-preview" class="screen">
    <div class="screen-header">
      <button class="btn-back" id="btn-back-preview" aria-label="Volver">← Volver</button>
      <h2 class="screen-title">Tu foto final</h2>
    </div>

    <div class="preview-final-wrap">
      <canvas id="canvas-preview-final"></canvas>
    </div>

    <div class="action-buttons action-buttons--preview">
      <button class="btn btn-primary btn-full" id="btn-upload-drive">
        <span id="upload-btn-text">☁ Subir a Google Drive</span>
        <span id="upload-spinner" class="spinner" style="display:none"></span>
      </button>
      <button class="btn btn-outline btn-full" id="btn-download">
        ↓ Guardar en mi teléfono
      </button>
      <button class="btn btn-ghost btn-full" id="btn-restart">
        ↺ Nueva foto
      </button>
    </div>

    <div id="upload-status" class="upload-status" role="status" aria-live="polite"></div>
  </div>

  <!-- config.js MUST be first — defines BOOTH_CONFIG used by canvas.js and app.js -->
  <script src="config.js"></script>
  <script src="canvas.js"></script>
  <script src="app.js"></script>
</body>
</html>
