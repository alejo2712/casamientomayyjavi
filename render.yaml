services:
  - type: web
    name: casamientomayyjavi
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: DRIVE_FOLDER_ID
        sync: false
